<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Food Planner - Dashboard</title>
    <style>
      :root { --accent: #0078d4; }
      html,body { height:100%; margin:0; font-family:"Segoe UI", Roboto, Arial, sans-serif; background:#fff; color:#111; }
      header { font-size:3.25rem; text-align:left; padding:2.5rem 1.25rem; font-weight:700; }
      main { padding:1.25rem; max-width:1000px; margin:0 auto; }
      form.search {
        display:flex; gap:.5rem; align-items:center; margin:1rem 0 2rem 0;
      }
      .search input[type="search"]{
        flex:1; padding:.75rem 1rem; border:1px solid #e3e3e3; border-radius:8px; font-size:1rem;
        box-shadow:0 2px 6px rgba(0,0,0,0.03);
      }
      .search button{
        background:var(--accent); color:#fff; border:none; padding:.75rem 1rem; border-radius:8px; cursor:pointer;
      }
      #results { display:grid; gap:1rem; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); }
      .meal {
        border:1px solid #f0f0f0; padding:.5rem; border-radius:8px; text-align:center; background:#fff;
      }
      .meal img { width:100%; height:140px; object-fit:cover; border-radius:6px; }
      .meal h3 { font-size:1rem; margin:.5rem 0 0; }
      .muted { color:#666; font-size:.9rem; margin-top:.25rem; }
      .visually-hidden { position:absolute !important; height:1px; width:1px; overflow:hidden; clip:rect(1px,1px,1px,1px); white-space:nowrap; }
      .empty { padding:1rem; color:#444; }
    </style>
  </head>
  <body>
    <header>What are you looking for today?</header>
    <main>
      <form id="searchForm" class="search" role="search" onsubmit="return false;">
        <label for="q" class="visually-hidden">Search for a specific food</label>
        <input id="q" type="search" placeholder="Search for a specific food 🔎🔎" aria-label="Search for a specific food" />
        <button id="searchBtn" type="button">Search</button>
      </form>

      <section id="results" aria-live="polite">
      </section>
    </main>

    <script>
      const apiBase = 'https://www.themealdb.com/api/json/v1/1/search.php?s=';
      const qEl = document.getElementById('q');
      const btn = document.getElementById('searchBtn');
      const results = document.getElementById('results');

      function renderMeals(meals) {
        results.innerHTML = '';
        if (!meals) {
          results.innerHTML = '<div class="empty">No results found.</div>';
          return;
        }
        const frag = document.createDocumentFragment();
        meals.forEach(m => {
          const div = document.createElement('div');
          div.className = 'meal';
          div.innerHTML = `
            <img src="${m.strMealThumb}" alt="${m.strMeal}" />
            <h3>${m.strMeal}</h3>
            <div class="muted">${m.strCategory || ''}${m.strArea ? ' • ' + m.strArea : ''}</div>
          `;
          div.addEventListener('click', () => {
            window.open(`https://www.themealdb.com/meal.php?c=${m.idMeal}`, '_blank');
          });
          frag.appendChild(div);
        });
        results.appendChild(frag);
      }

      async function doSearch() {
        const q = qEl.value.trim();
        if (!q) {
          results.innerHTML = '<div class="empty">Type a food name to search.</div>';
          return;
        }
        results.innerHTML = '<div class="empty">Searching…</div>';
        try {
          const res = await fetch(apiBase + encodeURIComponent(q));
          const json = await res.json();
          renderMeals(json.meals);
        } catch (e) {
          results.innerHTML = '<div class="empty">Error fetching results.</div>';
          console.error(e);
        }
      }

      btn.addEventListener('click', doSearch);
    </script>
  </body>
</html>
